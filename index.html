<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Volt — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .field { width:100%; padding:.7rem 1rem; border:1.5px solid #e2e8f0; border-radius:10px; font-size:.875rem; outline:none; transition:border-color .15s,box-shadow .15s; font-family:inherit; background:#fff; }
    .field:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .btn-primary { display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.75rem 1.5rem; background:#2563eb; color:#fff; border:none; border-radius:10px; font-size:.875rem; font-weight:600; cursor:pointer; transition:background .15s,transform .1s; width:100%; font-family:inherit; }
    .btn-primary:hover    { background:#1d4ed8; }
    .btn-primary:active   { transform:scale(.98); }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    .shake { animation:shake .3s ease-in-out; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both; }
    .collapsible { overflow:hidden; transition:max-height .35s ease, opacity .3s ease; }
    .collapsible.open   { max-height:600px; opacity:1; }
    .collapsible.closed { max-height:0;     opacity:0; pointer-events:none; }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 flex items-center justify-center p-4">

  <div class="fixed inset-0 opacity-10 pointer-events-none"
       style="background-image:radial-gradient(circle at 2px 2px,white 1px,transparent 0);background-size:32px 32px;"></div>

  <div class="w-full max-w-md relative fade-up">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-6">
      <div class="w-14 h-14 bg-white/15 border border-white/30 rounded-2xl flex items-center justify-center mb-3 backdrop-blur-sm shadow-xl">
        <i class="fas fa-bolt text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-extrabold text-white tracking-tight">Work Volt</h1>
      <p class="text-blue-200 mt-0.5 text-sm font-medium">Power your operations</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

      <div class="bg-blue-50 border-b border-blue-100 px-6 py-3 flex items-center gap-2">
        <i class="fas fa-shield-alt text-blue-500 text-sm"></i>
        <span class="text-xs font-bold text-blue-700 uppercase tracking-wide">Secure Sign In</span>
      </div>

      <div class="p-6 space-y-5">

        <!-- Error banner -->
        <div id="login-error" class="hidden p-3 bg-red-50 border border-red-200 rounded-xl text-xs text-red-600 flex items-center gap-2">
          <i class="fas fa-exclamation-circle flex-shrink-0"></i>
          <span id="error-text"></span>
        </div>

        <!-- ── Supabase Connection ── -->
        <div id="supabase-section">
          <div class="flex items-center justify-between mb-2">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Supabase Connection</label>
            <button onclick="toggleCredentials()" class="text-xs text-blue-600 hover:text-blue-700 font-medium flex items-center gap-1 transition-colors">
              <span id="cred-toggle-label">Change</span>
              <i id="cred-toggle-icon" class="fas fa-chevron-down text-[10px] transition-transform"></i>
            </button>
          </div>

          <!-- Collapsed: show saved status -->
          <div id="cred-display" class="flex items-center gap-3 px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl">
            <div class="w-7 h-7 rounded-lg flex items-center justify-center text-white text-xs flex-shrink-0" style="background:#3ecf8e">
              <i class="fas fa-database"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-sm font-semibold text-slate-800">Supabase</div>
              <div id="cred-display-status" class="text-xs text-slate-400">Not configured</div>
            </div>
          </div>

          <!-- Expanded: credential fields -->
          <div id="cred-section" class="collapsible closed mt-3 space-y-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Project URL</label>
              <input id="cred-url" type="url" class="field font-mono text-xs" placeholder="https://xxxxxxxxxxxx.supabase.co">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Anon Public Key</label>
              <input id="cred-anonKey" type="text" class="field font-mono text-xs" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
            </div>
            <p class="text-xs text-slate-400">
              <i class="fas fa-info-circle mr-1"></i>
              Found in Supabase dashboard → Settings → API
            </p>
          </div>
        </div>

        <div class="border-t border-slate-100"></div>

        <!-- Email -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Email</label>
          <input id="email" type="email" class="field" placeholder="you@company.com" autocomplete="email">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Password</label>
          <div class="relative">
            <input id="password" type="password" class="field pr-10" placeholder="••••••••" autocomplete="current-password">
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
              <i id="eye-icon" class="fas fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <!-- Sign In -->
        <button id="login-btn" onclick="doLogin()" class="btn-primary">
          <i class="fas fa-sign-in-alt"></i>
          <span>Sign In</span>
        </button>

        <div class="text-center">
          <button onclick="showResetForm()" class="text-xs text-blue-600 hover:text-blue-700 font-medium transition-colors">
            Forgot your password?
          </button>
        </div>

      </div>
    </div>

    <!-- Reset password panel -->
    <div id="reset-panel" class="hidden mt-4 bg-white rounded-2xl shadow-2xl overflow-hidden fade-up">
      <div class="bg-amber-50 border-b border-amber-100 px-6 py-3 flex items-center gap-2">
        <i class="fas fa-key text-amber-500 text-sm"></i>
        <span class="text-xs font-bold text-amber-700 uppercase tracking-wide">Reset Password</span>
      </div>
      <div class="p-6 space-y-4">
        <div id="reset-status"></div>
        <p class="text-sm text-slate-500">Enter your email and we'll send a reset link.</p>
        <input id="reset-email" type="email" class="field" placeholder="you@company.com">
        <div class="flex gap-3">
          <button onclick="hideResetForm()" class="flex-1 px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-sm font-semibold transition-colors">Cancel</button>
          <button onclick="doReset()" id="reset-btn" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold transition-colors">
            <i class="fas fa-paper-plane text-xs"></i> Send Link
          </button>
        </div>
      </div>
    </div>

    <p class="text-center text-blue-200/60 text-xs mt-5">Work Volt v2.0 • Powered by Supabase</p>
  </div>

  <script src="js/db-adapter.js"></script>
  <script>
  // ──────────────────────────────────────────────────────────────
  //  STATE
  // ──────────────────────────────────────────────────────────────
  let credSectionOpen = false;

  // ──────────────────────────────────────────────────────────────
  //  CREDENTIAL SECTION TOGGLE
  // ──────────────────────────────────────────────────────────────
  function toggleCredentials() {
    credSectionOpen = !credSectionOpen;
    const section = document.getElementById('cred-section');
    const display = document.getElementById('cred-display');
    const label   = document.getElementById('cred-toggle-label');
    const icon    = document.getElementById('cred-toggle-icon');

    if (credSectionOpen) {
      section.classList.replace('closed', 'open');
      display.classList.add('hidden');
      label.textContent = 'Done';
      icon.style.transform = 'rotate(180deg)';
      // Pre-fill saved credentials
      const saved = _loadSavedCredentials();
      if (saved) {
        document.getElementById('cred-url').value     = saved.url     || '';
        document.getElementById('cred-anonKey').value = saved.anonKey || '';
      }
    } else {
      section.classList.replace('open', 'closed');
      display.classList.remove('hidden');
      label.textContent = 'Change';
      icon.style.transform = '';
      updateCredDisplay();
    }
  }

  function updateCredDisplay() {
    const saved = _loadSavedCredentials();
    const status = document.getElementById('cred-display-status');
    if (saved?.url) {
      // Show just the project ref, not the full URL
      const ref = saved.url.replace('https://','').replace('.supabase.co','').split('.')[0];
      status.textContent = ref + '.supabase.co · Saved ✓';
    } else {
      status.textContent = 'Not configured — click Change to set up';
    }
  }

  function _loadSavedCredentials() {
    try {
      const raw = localStorage.getItem('wv_db_config');
      if (!raw) return null;
      const obj = JSON.parse(raw);
      return obj.provider === 'supabase' ? obj.credentials : null;
    } catch(e) { return null; }
  }

  function _loadSavedConfig() {
    try { return JSON.parse(localStorage.getItem('wv_db_config') || 'null'); } catch(e) { return null; }
  }

  // ──────────────────────────────────────────────────────────────
  //  BOOT
  // ──────────────────────────────────────────────────────────────
  window.addEventListener('load', async () => {
    const saved = _loadSavedConfig();

    if (saved?.provider === 'supabase' && saved?.credentials?.url) {
      // Credentials already saved — show collapsed display
      updateCredDisplay();
      // Restore last email
      const savedEmail = localStorage.getItem('wv_last_email');
      if (savedEmail) document.getElementById('email').value = savedEmail;
      // Auto-redirect if already logged in
      try {
        await initAdapter();
        const session = await WorkVoltDB.auth.getSession();
        if (session) { window.location.href = 'main.html'; return; }
      } catch(e) { /* not logged in, stay on page */ }
    } else {
      // First time — open credential fields automatically
      credSectionOpen = true;
      document.getElementById('cred-section').classList.replace('closed', 'open');
      document.getElementById('cred-display').classList.add('hidden');
      document.getElementById('cred-toggle-label').textContent = 'Done';
      document.getElementById('cred-toggle-icon').style.transform = 'rotate(180deg)';
    }

    const savedEmail = localStorage.getItem('wv_last_email');
    if (savedEmail) document.getElementById('email').value = savedEmail;
  });

  // ──────────────────────────────────────────────────────────────
  //  LOGIN
  // ──────────────────────────────────────────────────────────────
  function togglePwd() {
    const input = document.getElementById('password');
    input.type  = input.type === 'password' ? 'text' : 'password';
    document.getElementById('eye-icon').classList.toggle('fa-eye',       input.type === 'password');
    document.getElementById('eye-icon').classList.toggle('fa-eye-slash', input.type === 'text');
  }

  function showError(msg) {
    const box = document.getElementById('login-error');
    document.getElementById('error-text').textContent = msg;
    box.classList.remove('hidden');
    box.classList.add('shake');
    setTimeout(() => box.classList.remove('shake'), 350);
  }
  function hideError() { document.getElementById('login-error').classList.add('hidden'); }

  async function doLogin() {
    const btn      = document.getElementById('login-btn');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    hideError();
    if (!email)    return showError('Please enter your email.');
    if (!password) return showError('Please enter your password.');

    // If credential section is open, validate and save before login
    if (credSectionOpen) {
      const url     = document.getElementById('cred-url')?.value.trim()     || '';
      const anonKey = document.getElementById('cred-anonKey')?.value.trim() || '';
      if (!url)     return showError('Supabase Project URL is required.');
      if (!anonKey) return showError('Supabase Anon Key is required.');

      try {
        await connectAdapter('supabase', { url, anonKey });
      } catch(e) {
        return showError('Could not connect to Supabase: ' + e.message);
      }
    } else {
      // Use saved credentials
      try {
        await initAdapter();
      } catch(e) {
        showError('Could not load saved credentials. Click Change to re-enter them.');
        toggleCredentials();
        return;
      }
    }

    btn.disabled  = true;
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i><span>Signing in…</span>';

    try {
      const { user } = await WorkVoltDB.auth.login(email, password);
      localStorage.setItem('wv_last_email', email);
      sessionStorage.setItem('wv_user', JSON.stringify(user));
      window.location.href = 'main.html';
    } catch(err) {
      showError(err.message || 'Login failed. Check your email and password.');
      btn.disabled  = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Sign In</span>';
    }
  }

  // Allow Enter key on password field
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('password')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  // ──────────────────────────────────────────────────────────────
  //  PASSWORD RESET
  // ──────────────────────────────────────────────────────────────
  function showResetForm() {
    document.getElementById('reset-panel').classList.remove('hidden');
    document.getElementById('reset-email').value = document.getElementById('email').value;
    document.getElementById('reset-status').innerHTML = '';
  }
  function hideResetForm() {
    document.getElementById('reset-panel').classList.add('hidden');
  }

  async function doReset() {
    const email = document.getElementById('reset-email').value.trim();
    const btn   = document.getElementById('reset-btn');
    const status = document.getElementById('reset-status');

    if (!email) {
      status.innerHTML = '<p class="text-xs text-red-500">Please enter your email.</p>';
      return;
    }

    btn.disabled  = true;
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin text-xs"></i> Sending…';

    try {
      await initAdapter();
      await WorkVoltDB.auth.resetPassword(email);
      status.innerHTML = '<p class="text-xs text-green-600 font-medium"><i class="fas fa-check-circle mr-1"></i>Reset link sent — check your inbox.</p>';
      btn.disabled  = false;
      btn.innerHTML = '<i class="fas fa-paper-plane text-xs"></i> Send Link';
    } catch(e) {
      status.innerHTML = '<p class="text-xs text-red-500">' + (e.message || 'Failed to send reset email.') + '</p>';
      btn.disabled  = false;
      btn.innerHTML = '<i class="fas fa-paper-plane text-xs"></i> Send Link';
    }
  }
  </script>
</body>
</html>
