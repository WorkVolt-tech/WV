<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Volt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    .fade-in  { animation: fadeIn .25s ease both; }
    .slide-up { animation: slideUp .3s cubic-bezier(.16,1,.3,1) both; }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    #splash-screen { transition:opacity .4s ease,visibility .4s ease; }
    #splash-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
    .bolt-pulse { animation:boltPulse 2s ease-in-out infinite; }
    @keyframes boltPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.85} }
    .nav-item { transition:background .15s,color .15s; }
    .nav-item.active { background:#eff6ff; color:#1d4ed8; font-weight:600; }
    .nav-item.active i { color:#2563eb; }
    .field { width:100%; padding:.6rem .875rem; border:1.5px solid #e2e8f0; border-radius:10px; font-size:.875rem; outline:none; transition:border-color .15s,box-shadow .15s; font-family:inherit; }
    .field:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .btn-primary { display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.65rem 1.25rem; background:#2563eb; color:#fff; border:none; border-radius:10px; font-size:.875rem; font-weight:600; cursor:pointer; transition:background .15s,transform .1s; font-family:inherit; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-primary:active { transform:scale(.98); }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    .btn-secondary { display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.65rem 1.25rem; background:#f1f5f9; color:#475569; border:none; border-radius:10px; font-size:.875rem; font-weight:600; cursor:pointer; transition:background .15s; font-family:inherit; }
    .btn-secondary:hover { background:#e2e8f0; }
    #toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; display:flex; flex-direction:column; gap:.5rem; pointer-events:none; }
    .toast { display:flex; align-items:center; gap:.75rem; padding:.75rem 1.1rem; border-radius:12px; font-size:.875rem; font-weight:500; color:#fff; box-shadow:0 8px 24px rgba(0,0,0,.18); animation:toastIn .3s cubic-bezier(.16,1,.3,1); pointer-events:auto; max-width:360px; }
    .toast.success { background:#16a34a; }
    .toast.error   { background:#dc2626; }
    .toast.info    { background:#2563eb; }
    .toast.warning { background:#d97706; }
    @keyframes toastIn  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(12px)} }
    .thin-scroll::-webkit-scrollbar { width:4px; }
    .thin-scroll::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
    #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; }
    #sidebar-overlay.visible { display:block; }
    #sidebar { transition:width .22s cubic-bezier(.4,0,.2,1); }
    #sidebar.collapsed { width:56px !important; }
    #sidebar.collapsed .nav-label,
    #sidebar.collapsed .nav-section-label,
    #sidebar.collapsed .sidebar-footer-text,
    #sidebar.collapsed .drag-hint { display:none !important; }
    #sidebar.collapsed .nav-item { justify-content:center; padding-left:0; padding-right:0; }
    @media(max-width:768px) {
      #sidebar { position:fixed; top:0; left:0; height:100vh; z-index:50; transform:translateX(-100%); transition:transform .25s ease; }
      #sidebar.open { transform:translateX(0); }
    }
  </style>
  <base target="_blank">
</head>
<body class="min-h-screen">

  <!-- SPLASH -->
  <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800">
    <div class="flex flex-col items-center gap-8">
      <div class="relative">
        <div class="absolute inset-0 bg-white/20 rounded-3xl blur-xl scale-110"></div>
        <div class="relative inline-flex items-center justify-center w-24 h-24 bg-white/15 border border-white/30 rounded-3xl shadow-2xl backdrop-blur-sm bolt-pulse">
          <i class="fas fa-bolt text-white text-5xl"></i>
        </div>
      </div>
      <div class="text-center">
        <h1 class="text-4xl font-extrabold text-white tracking-tight">Work Volt</h1>
        <p class="text-blue-200 mt-1.5 text-base font-medium">Power your operations</p>
      </div>
      <div class="flex gap-2 mt-1">
        <div class="w-2 h-2 bg-white/70 rounded-full animate-bounce" style="animation-delay:0ms"></div>
        <div class="w-2 h-2 bg-white/70 rounded-full animate-bounce" style="animation-delay:150ms"></div>
        <div class="w-2 h-2 bg-white/70 rounded-full animate-bounce" style="animation-delay:300ms"></div>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-screen" class="hidden flex flex-col min-h-screen">

    <header class="bg-white border-b border-slate-200 px-4 h-14 flex items-center gap-3 sticky top-0 z-30 flex-shrink-0">
      <button onclick="toggleMobileSidebar()" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg transition-colors">
        <i class="fas fa-bars text-slate-600"></i>
      </button>
      <button id="app-back-btn" onclick="appGoBack()" class="hidden p-2 hover:bg-slate-100 rounded-lg transition-colors">
        <i class="fas fa-arrow-left text-slate-600"></i>
      </button>
      <div class="flex items-center gap-2 cursor-pointer" onclick="showModule('dashboard')">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-sm">
          <i class="fas fa-bolt text-white text-sm"></i>
        </div>
        <span class="text-lg font-extrabold text-slate-900 tracking-tight">Work Volt</span>
      </div>
      <div class="flex-1 max-w-sm mx-4 hidden md:block">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          <input type="text" placeholder="Search…" class="w-full pl-9 pr-4 py-2 bg-slate-100 border border-transparent rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
        </div>
      </div>
      <div id="header-notif-bell" class="hidden relative">
        <button onclick="showModule('notifications')" class="p-2 hover:bg-slate-100 rounded-lg transition-colors relative">
          <i class="fas fa-bell text-slate-600"></i>
          <span id="header-notif-badge" class="hidden absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
      </div>
      <div class="ml-auto flex items-center gap-1">
        <div class="relative" id="user-menu-container">
          <button onclick="toggleUserMenu(event)" class="flex items-center gap-2 pl-3 border-l border-slate-200 hover:bg-slate-100 rounded-lg p-2 transition-colors ml-1">
            <div id="user-avatar" class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-sm">?</div>
            <span id="user-name" class="hidden md:block text-sm font-semibold text-slate-700">…</span>
            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
          </button>
          <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-64 bg-white rounded-xl shadow-xl border border-slate-200 z-50 overflow-hidden">
            <div id="user-dropdown-inner"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <div id="sidebar-overlay" onclick="closeMobileSidebar()"></div>
      <aside id="sidebar" class="w-64 bg-white border-r border-slate-200 flex-shrink-0 flex flex-col lg:translate-x-0">
        <nav class="flex-1 overflow-y-auto thin-scroll p-3 space-y-0.5" id="nav-menu"></nav>
        <div class="p-3 border-t border-slate-100 flex items-center justify-between">
          <p class="text-[10px] text-slate-400 font-medium sidebar-footer-text" id="sidebar-footer-text">Work Volt v2.0</p>
          <button onclick="toggleSidebarCollapse()" class="w-7 h-7 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-all flex-shrink-0">
            <i class="fas fa-chevron-left text-xs" style="transition:transform .22s"></i>
          </button>
        </div>
      </aside>
      <main class="flex-1 overflow-y-auto bg-slate-50" id="main-content"></main>
    </div>
  </div>

  <div id="modals-root"></div>
  <div id="toast-container"></div>
  <div id="global-loading" class="hidden fixed inset-0 bg-white/70 z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="flex flex-col items-center gap-3">
      <i class="fas fa-circle-notch fa-spin text-3xl text-blue-600"></i>
      <p class="text-slate-600 text-sm font-medium">Loading…</p>
    </div>
  </div>

  <script src="js/db-adapter.js"></script>
  <script>
  // ──────────────────────────────────────────────────────────────
  //  STATE
  // ──────────────────────────────────────────────────────────────
  let currentUser = null;

  const MODULE_ROLES = {
    dashboard: ['SuperAdmin','Admin','Manager','Employee','Contractor'],
    settings:  ['SuperAdmin','Admin'],
    store:     ['SuperAdmin','Admin'],
    roles:     ['SuperAdmin','Admin'],
  };

  const ADDON_CATALOGUE = {
    notifications: { label:'Notifications',          icon:'fa-bell' },
    tasks:         { label:'Tasks',                  icon:'fa-check-circle' },
    pipeline:      { label:'Pipeline',               icon:'fa-users' },
    payroll:       { label:'Payroll',                icon:'fa-money-bill-wave' },
    timesheets:    { label:'Timesheets',             icon:'fa-clock' },
    financials:    { label:'Financials',             icon:'fa-chart-line' },
    crm:           { label:'CRM',                    icon:'fa-address-book' },
    projects:      { label:'Projects',               icon:'fa-folder-open' },
    reports:       { label:'Reports',                icon:'fa-chart-pie' },
    assets:        { label:'Assets',                 icon:'fa-box-open' },
    attendance:    { label:'Attendance Tracker',     icon:'fa-calendar-check' },
    invoices:      { label:'Invoice Manager',        icon:'fa-file-invoice-dollar' },
    inventory:     { label:'Inventory Control',      icon:'fa-warehouse' },
    scheduler:     { label:'Shift Scheduler',        icon:'fa-calendar-alt' },
    expenses:      { label:'Expense Claims',         icon:'fa-receipt' },
    contracts:     { label:'Contract Hub',           icon:'fa-file-signature' },
    helpdesk:      { label:'Help Desk',              icon:'fa-headset' },
    recruitment:   { label:'Recruitment Pipeline',   icon:'fa-user-tie' },
    roles:         { label:'Role Permissions',       icon:'fa-shield-alt' },
  };

  let INSTALLED_MODULES = [];
  window.INSTALLED_MODULES = INSTALLED_MODULES;

  // ──────────────────────────────────────────────────────────────
  //  SPLASH
  // ──────────────────────────────────────────────────────────────
  function hideSplash() {
    const s = document.getElementById('splash-screen');
    s.classList.add('hidden');
    setTimeout(() => s.style.display = 'none', 450);
  }

  // ──────────────────────────────────────────────────────────────
  //  AUTH
  // ──────────────────────────────────────────────────────────────
  async function handleLogout() {
    try { await WorkVoltDB.auth.logout(); } catch(e) {}
    sessionStorage.clear();
    window.location.href = 'index.html';
  }

  // ──────────────────────────────────────────────────────────────
  //  PERMISSIONS
  // ──────────────────────────────────────────────────────────────
  function canAccessModule(moduleId) {
    const role = currentUser?.role || 'Employee';
    if (moduleId === 'dashboard') return true;
    if (MODULE_ROLES[moduleId])   return MODULE_ROLES[moduleId].includes(role);
    if (role === 'SuperAdmin')    return true;
    return true; // installed modules default to accessible
  }

  // ──────────────────────────────────────────────────────────────
  //  APP SHELL
  // ──────────────────────────────────────────────────────────────
  async function showApp() {
    hideSplash();
    document.getElementById('app-screen').classList.remove('hidden');

    const name     = currentUser?.name || currentUser?.email || 'User';
    const initials = name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase() || '?';
    document.getElementById('user-name').textContent   = name;
    document.getElementById('user-avatar').textContent = initials;

    // Show provider badge in sidebar footer
    const providerType = getAdapterType();
    const providerInfo = ADAPTER_INFO[providerType] || {};
    document.getElementById('sidebar-footer-text').textContent =
      'Work Volt v2.0 · ' + (providerInfo.label || providerType || '');

    renderNav();
    startNotifPolling();
    applySidebarCollapse();

    const lastModule = sessionStorage.getItem('lastModule') || 'dashboard';
    history.replaceState({ module: lastModule }, '', '#' + lastModule);
    showModule(lastModule, false);
    updateBackButton();
  }

  // ──────────────────────────────────────────────────────────────
  //  NOTIFICATIONS
  // ──────────────────────────────────────────────────────────────
  function startNotifPolling() {
    const bell = document.getElementById('header-notif-bell');
    if (!bell || !canAccessModule('notifications')) return;
    bell.classList.remove('hidden');
    pollNotifBadge();
    setInterval(pollNotifBadge, 30000);
  }

  async function pollNotifBadge() {
    if (!currentUser) return;
    const badge = document.getElementById('header-notif-badge');
    try {
      const count = await WorkVoltDB.notifications.unreadCount(currentUser.id);
      badge.classList.toggle('hidden', count === 0);
    } catch(e) {}
  }

  // ──────────────────────────────────────────────────────────────
  //  NAV
  // ──────────────────────────────────────────────────────────────
  function _navOrderKey()      { return 'wv_nav_order_'+(currentUser?.id||'default'); }
  function _getSavedOrder()    { try{return JSON.parse(localStorage.getItem(_navOrderKey())||'[]');}catch(e){return[];} }
  function _saveNavOrder(ids)  { localStorage.setItem(_navOrderKey(),JSON.stringify(ids)); }

  function renderNav() {
    const nav  = document.getElementById('nav-menu');
    const role = currentUser?.role || 'Employee';

    const dashLink = `
      <a href="#dashboard" onclick="showModule('dashboard');return false;"
         class="nav-item flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium transition-colors"
         data-module="dashboard">
        <i class="fas fa-th-large w-4 text-slate-400"></i>
        <span class="nav-label">Dashboard</span>
      </a>`;

    let addons = (window.INSTALLED_MODULES||[]).filter(m => canAccessModule(m.id));
    const savedOrder = _getSavedOrder();
    if (savedOrder.length) {
      addons.sort((a,b) => {
        const ai=savedOrder.indexOf(a.id), bi=savedOrder.indexOf(b.id);
        if(ai===-1&&bi===-1)return 0; if(ai===-1)return 1; if(bi===-1)return -1; return ai-bi;
      });
    }

    const addonLinks = addons.length ? `
      <div class="px-3 pt-4 pb-1 flex items-center justify-between">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest nav-section-label">Modules</p>
        <span class="text-[9px] text-slate-300 font-medium drag-hint">drag to reorder</span>
      </div>
      <div id="nav-sortable" class="space-y-0.5">
        ${addons.map(m => {
          const def = ADDON_CATALOGUE[m.id]||{};
          return `
            <div class="nav-sortable-item" data-module-id="${m.id}" draggable="true">
              <a href="#${m.id}" onclick="showModule('${m.id}');return false;"
                 class="nav-item flex items-center gap-2 px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium transition-colors group"
                 data-module="${m.id}">
                <i class="fas fa-grip-vertical text-slate-200 group-hover:text-slate-300 text-[10px] flex-shrink-0 cursor-grab"></i>
                <i class="fas ${def.icon||m.icon||'fa-layer-group'} w-4 text-slate-400 flex-shrink-0"></i>
                <span class="nav-label">${def.label||m.label}</span>
              </a>
            </div>`;
        }).join('')}
      </div>` : '';

    const bottomLinks = `
      <div class="border-t border-slate-100 mt-2 pt-2 space-y-0.5">
        ${MODULE_ROLES.settings.includes(role) ? `
        <a href="#settings" onclick="showModule('settings');return false;"
           class="nav-item flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium transition-colors"
           data-module="settings">
          <i class="fas fa-cog w-4 text-slate-400"></i>
          <span class="nav-label">Settings</span>
        </a>` : ''}
        ${MODULE_ROLES.store?.includes(role) ? `
        <a href="#store" onclick="showModule('store');return false;"
           class="nav-item flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium transition-colors"
           data-module="store">
          <i class="fas fa-store w-4 text-slate-400"></i>
          <span class="nav-label">Module Store</span>
        </a>` : ''}
        ${MODULE_ROLES.roles?.includes(role) ? `
        <a href="#roles" onclick="showModule('roles');return false;"
           class="nav-item flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 rounded-xl text-sm font-medium transition-colors"
           data-module="roles">
          <i class="fas fa-shield-alt w-4 text-slate-400"></i>
          <span class="nav-label">Role Permissions</span>
        </a>` : ''}
      </div>`;

    nav.innerHTML = dashLink + addonLinks + bottomLinks;
    _initNavDrag();
  }

  function _initNavDrag() {
    const sortable = document.getElementById('nav-sortable');
    if (!sortable) return;
    let dragEl = null;
    sortable.querySelectorAll('.nav-sortable-item').forEach(item => {
      item.addEventListener('dragstart', e => { dragEl=item; setTimeout(()=>item.style.opacity='.4',0); e.dataTransfer.effectAllowed='move'; });
      item.addEventListener('dragend',   () => { item.style.opacity=''; dragEl=null; _saveNavOrder(Array.from(sortable.querySelectorAll('.nav-sortable-item')).map(el=>el.dataset.moduleId)); });
      item.addEventListener('dragover',  e => { e.preventDefault(); if(!dragEl||dragEl===item)return; const r=item.getBoundingClientRect(); e.clientY<r.top+r.height/2?sortable.insertBefore(dragEl,item):sortable.insertBefore(dragEl,item.nextSibling); });
    });
  }

  // ──────────────────────────────────────────────────────────────
  //  MODULE ROUTING
  // ──────────────────────────────────────────────────────────────
  function showModule(name, push=true) {
    closeMobileSidebar();
    sessionStorage.setItem('lastModule', name);
    if (push) history.pushState({ module: name }, '', '#'+name);
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.module===name));
    const main = document.getElementById('main-content');
    main.innerHTML = `<div class="flex items-center justify-center h-64"><i class="fas fa-circle-notch fa-spin text-3xl text-blue-500 opacity-60"></i></div>`;
    requestAnimationFrame(() => loadPage(name, main));
    updateBackButton();
  }

  function loadPage(name, container) {
    if (window.WorkVoltPages?.[name]) { window.WorkVoltPages[name](container); return; }
    const existing = document.querySelector(`script[data-page="${name}"]`);
    if (existing) existing.remove();
    const script = document.createElement('script');
    script.src = `pages/${name}.js`;
    script.dataset.page = name;
    script.onload  = () => window.WorkVoltPages?.[name] ? window.WorkVoltPages[name](container) : renderPagePlaceholder(name, container);
    script.onerror = () => renderPagePlaceholder(name, container);
    document.head.appendChild(script);
  }

  function renderPagePlaceholder(name, container) {
  const def = ADDON_CATALOGUE[name] || {};
  const isInstalled = (window.INSTALLED_MODULES || []).some(m => m.id === name);
  
  // Check if the JS file actually exists by checking if WorkVoltPages loaded
  const hasPageFile = window.WorkVoltPages?.[name];
  
  if (!hasPageFile && isInstalled) {
    // Module is installed but page file doesn't exist - show "Coming Soon"
    container.innerHTML = `
      <div class="p-6 md:p-8 fade-in">
        <div class="max-w-2xl mx-auto mt-16 text-center">
          <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-amber-100 to-orange-100 rounded-2xl mb-6 shadow-sm">
            <i class="fas fa-rocket text-amber-500 text-3xl"></i>
          </div>
          <h2 class="text-2xl font-extrabold text-slate-800 mb-2">${def.label || name}</h2>
          <p class="text-slate-500 mb-6 text-sm leading-relaxed max-w-md mx-auto">
            This module is installed and ready, but the page file is still in development. 
            Check back soon for updates!
          </p>
          <div class="flex items-center justify-center gap-2 text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 max-w-sm mx-auto">
            <i class="fas fa-clock"></i>
            <span>Coming in the next update</span>
          </div>
          ${def.description ? `
          <div class="mt-6 p-4 bg-slate-50 rounded-xl border border-slate-100 max-w-sm mx-auto text-left">
            <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-2">Planned Features</p>
            <p class="text-sm text-slate-600">${def.description}</p>
          </div>` : ''}
        </div>
      </div>`;
  } else {
    // Module not installed or file exists - show default message
    container.innerHTML = `
      <div class="p-6 md:p-8 fade-in">
        <div class="max-w-2xl mx-auto mt-16 text-center">
          <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 rounded-2xl mb-6">
            <i class="fas ${def.icon || 'fa-layer-group'} text-blue-400 text-3xl"></i>
          </div>
          <h2 class="text-2xl font-extrabold text-slate-800 mb-2">${def.label || name}</h2>
          <p class="text-slate-500 mb-6 text-sm leading-relaxed">
            ${isInstalled 
              ? `Create <code class="bg-slate-100 px-2 py-0.5 rounded text-blue-600 font-mono text-xs">pages/${name}.js</code> and register it as <code class="bg-slate-100 px-2 py-0.5 rounded text-blue-600 font-mono text-xs">WorkVoltPages.${name}</code>.`
              : `Install this module from the <a href="#store" onclick="showModule('store'); return false;" class="text-blue-600 hover:underline">Module Store</a> to get started.`
            }
          </p>
        </div>
      </div>`;
  }
}

  window.addEventListener('popstate', e => showModule(e.state?.module||'dashboard', false));
  function updateBackButton() { document.getElementById('app-back-btn').classList.toggle('hidden', history.length<=1); }
  function appGoBack() { history.back(); }

  // ──────────────────────────────────────────────────────────────
  //  USER MENU
  // ──────────────────────────────────────────────────────────────
  function renderUserDropdown() {
    const providerType = getAdapterType();
    const providerInfo = ADAPTER_INFO[providerType]||{};
    document.getElementById('user-dropdown-inner').innerHTML = `
      <div class="px-4 py-3 border-b border-slate-100 bg-slate-50">
        <p class="text-xs font-semibold text-slate-700 truncate">${currentUser?.name||''}</p>
        <p class="text-xs text-slate-400 truncate">${currentUser?.email||''}</p>
        <div class="flex items-center gap-1.5 mt-1.5">
          <div class="w-4 h-4 rounded flex items-center justify-center text-white text-[8px]" style="background:${{'supabase':'#3ecf8e','firebase':'#f5820d','sheets':'#0f9d58'}[providerType]||'#64748b'}">
            <i class="fas ${providerInfo.icon||'fa-database'}"></i>
          </div>
          <span class="text-[10px] text-slate-400 font-medium">${providerInfo.label||providerType||'Database'}</span>
        </div>
      </div>
      <button onclick="openChangePasswordModal();closeUserMenu();" class="w-full px-4 py-2.5 text-left text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2.5 transition-colors">
        <i class="fas fa-shield-alt text-slate-400 w-4"></i>Change Password
      </button>
      <button onclick="openSwitchDatabaseModal();closeUserMenu();" class="w-full px-4 py-2.5 text-left text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2.5 transition-colors">
        <i class="fas fa-database text-slate-400 w-4"></i>Switch Database
      </button>
      <div class="border-t border-slate-100"></div>
      <button onclick="handleLogout()" class="w-full px-4 py-2.5 text-left text-sm text-red-600 hover:bg-red-50 flex items-center gap-2.5 transition-colors">
        <i class="fas fa-sign-out-alt text-red-400 w-4"></i>Sign Out
      </button>`;
  }

  function toggleUserMenu(e) {
    e?.stopPropagation();
    const dd = document.getElementById('user-dropdown');
    dd.classList.toggle('hidden');
    if (!dd.classList.contains('hidden')) renderUserDropdown();
  }
  function closeUserMenu() { document.getElementById('user-dropdown').classList.add('hidden'); }
  document.addEventListener('click', e => { if(!document.getElementById('user-menu-container')?.contains(e.target)) closeUserMenu(); });

  function openChangePasswordModal() {
    const root = document.getElementById('modals-root');
    root.innerHTML = `
      <div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" id="modal-backdrop" onclick="if(event.target===this)document.getElementById('modals-root').innerHTML=''">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
          <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
            <h3 class="font-bold text-slate-900">Change Password</h3>
            <button onclick="document.getElementById('modals-root').innerHTML=''" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400"><i class="fas fa-times text-sm"></i></button>
          </div>
          <div class="px-6 py-5 space-y-4">
            <div id="pwd-status"></div>
            <div><label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">New Password</label>
            <input id="pwd-new" type="password" class="field" placeholder="Min 6 characters"></div>
            <div><label class="block text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1.5">Confirm</label>
            <input id="pwd-confirm" type="password" class="field" placeholder="Repeat password"></div>
            <div class="flex gap-3 pt-1">
              <button onclick="document.getElementById('modals-root').innerHTML=''" class="btn-secondary flex-1">Cancel</button>
              <button onclick="submitChangePassword()" class="btn-primary flex-1"><i class="fas fa-save text-sm"></i>Save</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  window.submitChangePassword = async function() {
    const newPwd  = document.getElementById('pwd-new')?.value||'';
    const confPwd = document.getElementById('pwd-confirm')?.value||'';
    const statusEl = document.getElementById('pwd-status');
    if (!newPwd||newPwd.length<6) { statusEl.innerHTML='<p class="text-xs text-red-600 mb-2">Min 6 characters.</p>'; return; }
    if (newPwd!==confPwd)          { statusEl.innerHTML='<p class="text-xs text-red-600 mb-2">Passwords do not match.</p>'; return; }
    try {
      await WorkVoltDB.auth.changePassword(newPwd);
      statusEl.innerHTML='<p class="text-xs text-green-700 mb-2"><i class="fas fa-check-circle mr-1"></i>Password updated!</p>';
      setTimeout(()=>document.getElementById('modals-root').innerHTML='',1200);
    } catch(err) { statusEl.innerHTML='<p class="text-xs text-red-600 mb-2">'+err.message+'</p>'; }
  };

  function openSwitchDatabaseModal() {
    // Simply redirect to login — credentials will be editable there
    if (confirm('Switch to a different database? You will be signed out.')) {
      handleLogout();
    }
  }

  // ──────────────────────────────────────────────────────────────
  //  SIDEBAR
  // ──────────────────────────────────────────────────────────────
  function toggleSidebarCollapse() {
    const c = document.getElementById('sidebar').classList.toggle('collapsed');
    localStorage.setItem('wv_sidebar_collapsed', c?'1':'0');
  }
  function applySidebarCollapse() {
    if (localStorage.getItem('wv_sidebar_collapsed')==='1') document.getElementById('sidebar').classList.add('collapsed');
  }
  function toggleMobileSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('visible'); }
  function closeMobileSidebar()  { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('visible'); }

  // ──────────────────────────────────────────────────────────────
  //  TOAST
  // ──────────────────────────────────────────────────────────────
  function showToast(msg, type='info', duration=3500) {
    const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle', warning:'fa-triangle-exclamation' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(()=>{ toast.style.animation='toastOut .3s ease forwards'; setTimeout(()=>toast.remove(),300); },duration);
  }

    // ------API bridge for page modules (financials.js, etc.)
async function apiCall(path, params = {}) {
  const parts = path.split('/');
  const module = parts[0];      // "financials"
  const table = parts[1];       // "invoices", "expenses", etc.
  const operation = parts[2] || 'list';  // "list", "create", "update", "delete", etc.
  
  // Map to Supabase table names
  const tableMap = {
    'invoices': 'financial_invoices',
    'expenses': 'financial_expenses',
    'bills': 'financial_bills',
    'budgets': 'financial_budgets',
    'accounts': 'financial_accounts',
    'cost-centers': 'financial_cost_centers',
    'payments': 'financial_payments'
  };
  
  const supabaseTable = tableMap[table];
  if (!supabaseTable) {
    throw new Error('Unknown table: ' + table);
  }
  
  switch(operation) {
    case 'list':
      const rows = await WorkVoltDB.list(supabaseTable, params);
      return { rows: rows };
      
    case 'create':
      return await WorkVoltDB.create(supabaseTable, params);
      
    case 'update':
      const { id, ...patch } = params;
      return await WorkVoltDB.update(supabaseTable, id, patch);
      
    case 'delete':
      return await WorkVoltDB.delete(supabaseTable, params.id);
      
    case 'send':
      return await WorkVoltDB.update(supabaseTable, params.id, { status: 'Sent' });
      
    case 'mark-paid':
      return await WorkVoltDB.update(supabaseTable, params.id, { status: 'Paid', balance_due: 0 });
      
    case 'approve':
      return await WorkVoltDB.update(supabaseTable, params.id, { status: 'Approved', approved_by: params.approved_by });
      
    case 'reject':
      return await WorkVoltDB.update(supabaseTable, params.id, { status: 'Rejected', approved_by: params.approved_by });
      
    default:
      throw new Error('Unknown operation: ' + operation);
  }
}
  // ──────────────────────────────────────────────────────────────
  //  GLOBAL API
  // ──────────────────────────────────────────────────────────────
  window.WorkVolt = {
    db:       WorkVoltDB,
    api:      apiCall,
    user:     () => currentUser,
    toast:    showToast,
    navigate: showModule,
  };
  window.WorkVoltPages = window.WorkVoltPages || {};
  window.renderNav     = renderNav;

  // ──────────────────────────────────────────────────────────────
  //  BOOT
  // ──────────────────────────────────────────────────────────────
  window.addEventListener('load', async () => {
    try {
      // 1. Init adapter from saved credentials
      const adapter = await initAdapter();
      if (!adapter) { window.location.href = 'index.html'; return; }

      // 2. Check session
      const session = await WorkVoltDB.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }

      // 3. Load user profile
      currentUser = await WorkVoltDB.auth.getUser();
      if (!currentUser) { window.location.href = 'index.html'; return; }
      sessionStorage.setItem('wv_user', JSON.stringify(currentUser));

      // 4. Load installed modules
      try {
        INSTALLED_MODULES = await WorkVoltDB.config.getInstalledModules();
        window.INSTALLED_MODULES = INSTALLED_MODULES;
      } catch(e) { console.warn('Could not load modules:', e.message); }

      // 5. Show app
      await showApp();

    } catch(err) {
      console.error('Boot error:', err);
      hideSplash();
      showToast('Failed to load: ' + err.message, 'error');
      setTimeout(() => window.location.href = 'index.html', 3000);
    }
  });
  </script>
